<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor Control Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 0; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #45475a; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { color: #89b4fa; margin: 0; font-size: 2.2rem; }
        .btn-danger { background-color: #f38ba8; color: #11111b; border: none; padding: 12px 20px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-danger:hover { background-color: #eba0ac; }

        /* SECTION 1: ACTIVE JOBS (CARDS) */
        .section-title { color: #fab387; font-size: 1.5rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        
        .station-card { background-color: #313244; border-radius: 15px; padding: 20px; border-top: 5px solid #6c7086; box-shadow: 0 10px 20px rgba(0,0,0,0.3); display: flex; flex-direction: column; gap: 15px; transition: border-color 0.3s; }
        .station-card.online { border-top-color: #a6e3a1; }
        .station-card.offline { border-top-color: #f38ba8; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .card-header h2 { margin: 0; color: #fff; font-size: 1.8rem; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; }
        .status-badge.online { background-color: rgba(166, 227, 161, 0.2); color: #a6e3a1; }
        .status-badge.offline { background-color: rgba(243, 139, 168, 0.2); color: #f38ba8; }

        .job-details { background-color: #1e1e2e; padding: 15px; border-radius: 10px; border: 1px solid #45475a; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.1rem; }
        .detail-row:last-child { margin-bottom: 0; }
        .detail-label { color: #a6adc8; }
        .detail-value { font-family: monospace; font-weight: bold; font-size: 1.2rem; color: #b4befe; }
        .val-highlight { color: #a6e3a1; }

        .message-box { display: flex; gap: 10px; margin-top: auto; }
        .message-box input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #45475a; background-color: #11111b; color: #fff; font-size: 1rem; }
        .message-box button { background-color: #89b4fa; color: #11111b; border: none; padding: 0 15px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .msg-status { font-size: 0.85rem; color: #f9e2af; font-style: italic; margin-top: 5px; min-height: 16px; }

        .alert-box { display: none; background-color: rgba(243, 139, 168, 0.1); border: 2px solid #f38ba8; padding: 10px; border-radius: 10px; text-align: center; margin-top: 10px; animation: pulse 1s infinite alternate; }
        .alert-text { color: #f38ba8; font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; }
        .alert-btn { background-color: #f38ba8; color: #11111b; border: none; padding: 8px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; }

        /* SECTION 2: SHIFT TOTALS (TABLE) */
        .table-container { background-color: #313244; border-radius: 15px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); overflow-x: auto; }
        .shift-table { width: 100%; border-collapse: collapse; text-align: left; }
        .shift-table th { background-color: #1e1e2e; color: #89b4fa; padding: 15px; font-size: 1.1rem; border-bottom: 2px solid #45475a; }
        .shift-table td { padding: 15px; border-bottom: 1px solid #45475a; font-size: 1.2rem; }
        .shift-table tr:last-child td { border-bottom: none; }
        .shift-table tr:hover { background-color: #45475a; }
        
        .tbl-station { font-weight: bold; color: #fff; }
        .tbl-batch { background-color: #11111b; padding: 4px 8px; border-radius: 5px; font-family: monospace; color: #b4befe; font-size: 1.1rem; }
        .tbl-num { font-family: monospace; font-weight: bold; font-size: 1.4rem; color: #cdd6f4; }
        
        .target-control { display: flex; gap: 10px; }
        .target-control input { width: 100px; padding: 8px; border-radius: 6px; border: 1px solid #45475a; background-color: #11111b; color: #fff; font-family: monospace; font-size: 1.1rem; }
        .target-control button { background-color: #fab387; color: #11111b; border: none; padding: 0 15px; font-weight: bold; border-radius: 6px; cursor: pointer; }

        .progress-container { width: 100%; min-width: 150px; background-color: #11111b; border-radius: 10px; height: 25px; position: relative; overflow: hidden; border: 1px solid #45475a; }
        .progress-fill { height: 100%; background-color: #89b4fa; width: 0%; transition: width 0.5s ease-in-out; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; box-sizing: border-box; font-size: 0.9rem; font-weight: bold; color: #11111b; }
        .progress-fill.done { background-color: #a6e3a1; }

        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.02); box-shadow: 0 0 15px rgba(243, 139, 168, 0.4); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏭 Production Supervisor Dashboard</h1>
        <button class="btn-danger" onclick="resetAllShifts()">⚠️ Reset ALL Shift Data</button>
    </div>

    <div class="section-title">▶ Current Active Jobs (Live Feed)</div>
    <div class="grid-container" id="stationsGrid">
        </div>

    <div class="section-title">📊 Total Shift Performance (All Jobs)</div>
    <div class="table-container">
        <table class="shift-table">
            <thead>
                <tr>
                    <th>Station</th>
                    <th>Active Batch</th>
                    <th>Total Shift Pallets</th>
                    <th>Total Shift Pieces</th>
                    <th>Set Shift Target</th>
                    <th>Goal Progress</th>
                </tr>
            </thead>
            <tbody id="shiftTableBody">
                </tbody>
        </table>
    </div>

<script>
    // 🔥 ΒΑΛΕ ΕΔΩ ΤΟ ΔΙΚΟ ΣΟΥ RENDER URL 🔥
    const SERVER_URL = "https://my-factory-server.onrender.com";
    
    const STATION_NAMES = {
        "1": "Line 1", "2": "Line 2", "3": "Line 3",
        "4": "Line 4", "5": "Pouch", "6": "Powder Room"
    };

    function initUI() {
        const grid = document.getElementById('stationsGrid');
        const tbody = document.getElementById('shiftTableBody');
        
        for (let i = 1; i <= 6; i++) {
            // Create Top Cards
            let card = document.createElement('div');
            card.className = "station-card offline";
            card.id = `card-${i}`;
            card.innerHTML = `
                <div class="card-header">
                    <h2>${STATION_NAMES[i]}</h2>
                    <span class="status-badge offline" id="status-${i}">OFFLINE</span>
                </div>
                <div class="job-details">
                    <div class="detail-row"><span class="detail-label">Active Batch:</span> <span class="detail-value" id="c-batch-${i}">-</span></div>
                    <div class="detail-row"><span class="detail-label">Job Pieces:</span> <span class="detail-value val-highlight" id="c-pcs-${i}">0</span></div>
                    <div class="detail-row"><span class="detail-label">Job Pallets:</span> <span class="detail-value" id="c-plts-${i}">0</span></div>
                </div>
                
                <div class="alert-box" id="alert-${i}">
                    <div class="alert-text" id="alert-text-${i}">Alert!</div>
                    <button class="alert-btn" onclick="ackAlert(${i})">Acknowledge Alert</button>
                </div>

                <div class="message-box">
                    <input type="text" id="msg-input-${i}" placeholder="Send message to tablet...">
                    <button onclick="sendMessage(${i})">Send</button>
                </div>
                <div class="msg-status" id="msg-status-${i}"></div>
            `;
            grid.appendChild(card);

            // Create Bottom Table Rows
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="tbl-station">${STATION_NAMES[i]}</td>
                <td><span class="tbl-batch" id="t-batch-${i}">-</span></td>
                <td class="tbl-num" id="t-plts-${i}">0</td>
                <td class="tbl-num" id="t-pcs-${i}">0</td>
                <td>
                    <div class="target-control">
                        <input type="number" id="target-input-${i}" placeholder="Target">
                        <button onclick="setTarget(${i})">Set</button>
                    </div>
                </td>
                <td>
                    <div class="progress-container">
                        <div class="progress-fill" id="prog-${i}">0%</div>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        }
    }

    async function fetchSupervisorData() {
        if (!SERVER_URL || !SERVER_URL.includes("http")) return;
        try {
            const res = await fetch(`${SERVER_URL}/api/get_supervisor_data`);
            const data = await res.json();
            
            for (let i = 1; i <= 6; i++) {
                let st = data[i.toString()];
                if (!st) continue;

                // 1. Update Top Card (Current Job)
                let card = document.getElementById(`card-${i}`);
                let statusBadge = document.getElementById(`status-${i}`);
                if (st.status === "Online") {
                    card.className = "station-card online";
                    statusBadge.className = "status-badge online";
                    statusBadge.textContent = "ONLINE";
                } else {
                    card.className = "station-card offline";
                    statusBadge.className = "status-badge offline";
                    statusBadge.textContent = "OFFLINE";
                }

                document.getElementById(`c-batch-${i}`).textContent = st.batch_number;
                document.getElementById(`c-pcs-${i}`).textContent = st.job_total.toLocaleString();
                document.getElementById(`c-plts-${i}`).textContent = st.job_pallets;

                // Handle Alerts
                let alertBox = document.getElementById(`alert-${i}`);
                if (st.worker_alert !== "" && !st.alert_acknowledged) {
                    alertBox.style.display = "block";
                    document.getElementById(`alert-text-${i}`).textContent = `⚠️ Call from: ${st.worker_alert}`;
                } else {
                    alertBox.style.display = "none";
                }

                // Handle Messages
                let msgStatus = document.getElementById(`msg-status-${i}`);
                if (st.supervisor_message !== "") {
                    msgStatus.textContent = st.message_read ? "✓ Tablet read your message" : "⏳ Tablet ringing... (Unread)";
                    msgStatus.style.color = st.message_read ? "#a6e3a1" : "#f9e2af";
                } else {
                    msgStatus.textContent = "";
                }

                // 2. Update Bottom Table (Shift Totals)
                document.getElementById(`t-batch-${i}`).textContent = st.batch_number;
                document.getElementById(`t-plts-${i}`).textContent = st.shift_pallets;
                document.getElementById(`t-pcs-${i}`).textContent = st.shift_total.toLocaleString();
                
                let targetInput = document.getElementById(`target-input-${i}`);
                if (document.activeElement !== targetInput && st.shift_target > 0) {
                    targetInput.value = st.shift_target;
                }

                // Progress Bar Math
                let progBar = document.getElementById(`prog-${i}`);
                let pct = 0;
                if (st.shift_target > 0) {
                    pct = Math.floor((st.shift_total / st.shift_target) * 100);
                }
                if (pct > 100) pct = 100;
                
                progBar.style.width = `${pct}%`;
                progBar.textContent = pct > 0 ? `${pct}%` : "";
                
                if (pct >= 100) { progBar.classList.add('done'); } 
                else { progBar.classList.remove('done'); }
            }
        } catch (e) {
            console.log("Polling error.");
        }
    }

    function setTarget(stationId) {
        let val = document.getElementById(`target-input-${stationId}`).value;
        if (!val || val <= 0) return;
        fetch(`${SERVER_URL}/api/set_target`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ station_id: stationId, target: parseInt(val) })
        });
    }

    function sendMessage(stationId) {
        let msgInput = document.getElementById(`msg-input-${stationId}`);
        let msg = msgInput.value.trim();
        if (msg === "") return;
        fetch(`${SERVER_URL}/api/send_message`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ station_id: stationId, message: msg })
        }).then(() => { msgInput.value = ""; });
    }

    function ackAlert(stationId) {
        fetch(`${SERVER_URL}/api/ack_alert`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ station_id: stationId })
        });
    }

    function resetAllShifts() {
        if (confirm("⚠️ WARNING: Are you sure you want to completely RESET all shift totals, targets, and pallets across the entire factory?\n\nThis will zero out the Shift Totals table immediately.")) {
            fetch(`${SERVER_URL}/api/reset_shift`, { method: 'POST' });
        }
    }

    initUI();
    setInterval(fetchSupervisorData, 2000);
    fetchSupervisorData();

</script>
</body>
</html>
